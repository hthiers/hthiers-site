
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hernán Thiers | Consultor TI</title>
    <style>
        @page {
            size: A4;
            margin: 0;
            background-color: #0f172a;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f1f5f9;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 650px;
            padding: 60px 40px;
            border: 1px solid #1e293b;
            border-radius: 16px;
            background: #1e293b70;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h1 {
            color: #38bdf8;
            font-size: 32pt;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        h2 {
            color: #94a3b8;
            font-size: 14pt;
            font-weight: 400;
            margin: 0 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .accent-bar {
            height: 4px;
            width: 80px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            margin: 0 auto 30px auto;
            border-radius: 2px;
        }
        p {
            font-size: 13pt;
            line-height: 1.7;
            margin-bottom: 25px;
            color: #cbd5e1;
        }
        .expertise-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .tag {
            padding: 6px 16px;
            background: #0ea5e920;
            color: #38bdf8;
            border: 1px solid #0ea5e940;
            border-radius: 8px;
            font-size: 10pt;
            font-weight: 500;
        }
        .status {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            font-size: 11pt;
            color: #94a3b8;
        }
        .highlight {
            color: #38bdf8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hernán Thiers</h1>
        <h2>Consultor Referente en TI</h2>
        <div class="accent-bar"></div>
        
        <p>Especialista en <span class="highlight">modernización de sistemas legados</span>, <span class="highlight">integración de agentes IA</span>, <span class="highlight">automatización</span> e <span class="highlight">ingeniería de software</span>.</p>
        
        <div class="expertise-list">
            <span class="tag">Legacy Modernization</span>
            <span class="tag">AI Agents</span>
            <span class="tag">Automation</span>
            <span class="tag">Software Engineering</span>
        </div>
        
        <div class="status">
            <p>Sitio profesional en construcción.</p>
            <p style="font-size: 10pt; opacity: 0.8;">Contacto: hernan@thiers.cl</p>
        </div>
    </div>
</body>
</html>
